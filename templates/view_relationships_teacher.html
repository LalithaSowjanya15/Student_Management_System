<!DOCTYPE html>
<html>
<head>
    <title>Student Friendships</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="list-page">

<div class="list-container">

    <h2 class="list-title">Student Friendships</h2>

    <!-- search form -->
    <form method="post" class="list-search-form">

        <input
            type="text"
            name="roll_no"
            placeholder="Enter Roll Number"
            required
            class="list-input"
        >

        <button
            type="submit"
            class="list-btn"
        >
            View
        </button>

    </form>

    {% if relations %}
        <h3 class="list-subtitle">
            Friendships of {{ roll_no }}
        </h3>

        <ul class="list-box">
            {% for r in relations %}
                <li>
                    {{ r.name }} ({{ r.roll_no }})
                </li>

            {% endfor %}
        </ul>

    {% elif roll_no %}
        <p class="no-data">No Friends found</p>
    {% endif %}

    <a href="/teacher_dashboard" class="back-link">← Back</a>

</div>

</body>
</html>
